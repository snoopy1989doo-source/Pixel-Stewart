<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixel Steward - ผู้พิทักษ์พอร์ตมหาสมบัติ</title>
  <!-- Google Fonts: Press Start 2P (Retro Game style) and Kanit (Clean Thai typography) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Kanit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR (NAVIGATION) -->
    <aside class="sidebar border-pixel">
      <div class="brand">
        <div class="logo">🥇</div>
        <div class="title-container">
          <h1 class="brand-title">PIXEL</h1>
          <h1 class="brand-title highlight">STEWARD</h1>
        </div>
      </div>
      
      <div class="nav-divider"></div>
      
      <nav class="nav-menu">
        <button class="nav-item active" data-tab="dashboard">
          <span class="icon">📊</span> <span class="nav-text">Dashboard</span>
        </button>
        <button class="nav-item" data-tab="portfolios">
          <span class="icon">📁</span> <span class="nav-text">พอร์ตลงทุน</span>
        </button>
        <button class="nav-item" data-tab="quarterly">
          <span class="icon">📈</span> <span class="nav-text">หุ้นรายไตรมาส</span>
        </button>
        <button class="nav-item" data-tab="forex">
          <span class="icon">💱</span> <span class="nav-text">Forex รายเดือน</span>
        </button>
        <button class="nav-item" data-tab="option">
          <span class="icon">💎</span> <span class="nav-text">Option รายเดือน</span>
        </button>
        <button class="nav-item" data-tab="cashflow">
          <span class="icon">💧</span> <span class="nav-text">Cash Flow</span>
        </button>
        <button class="nav-item" data-tab="comparison">
          <span class="icon">⚔️</span> <span class="nav-text">ตารางเปรียบเทียบ</span>
        </button>
        <button class="nav-item" data-tab="settings">
          <span class="icon">⚙️</span> <span class="nav-text">ตั้งค่าระบบ</span>
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <div class="exchange-rate-widget border-pixel-inset">
          <div class="rate-label">🇺🇸 USD/THB:</div>
          <div class="rate-value-container">
            <span class="rate-symbol">฿</span>
            <input type="number" step="0.1" id="global-usd-rate" class="rate-input" value="36.5">
          </div>
        </div>
        <div class="version">V1.2.2 LOCAL-FIRST</div>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
      <header class="top-header border-pixel">
        <div class="header-info">
          <h2 id="page-title">แดชบอร์ดภาพรวม</h2>
          <p id="page-subtitle" class="text-muted">สรุปสถานะพอร์ตการลงทุนทั้งหมดในพริบตา</p>
        </div>
        
        <div class="quick-actions">
          <button id="btn-add-portfolio" class="btn btn-primary btn-retro">
            <span>➕ เพิ่มพอร์ตใหม่</span>
          </button>
          <button id="btn-quick-transfer" class="btn btn-accent btn-retro">
            <span>⚡ โยกย้ายเสบียง</span>
          </button>
        </div>
      </header>

      <!-- DYNAMIC TAB CONTENT -->
      <section id="tab-content" class="content-body">
        <!-- Content will be generated dynamically by app.js -->
      </section>
    </main>
  </div>

  <!-- ========================================== -->
  <!-- MODAL: ADD / EDIT PORTFOLIO -->
  <!-- ========================================== -->
  <div id="portfolio-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <div class="modal-header">
        <h3 id="portfolio-modal-title">📦 เพิ่มพอร์ตการลงทุน</h3>
        <button class="btn-close-modal">✖</button>
      </div>
      <form id="portfolio-form" class="modal-body">
        <input type="hidden" id="edit-port-id">
        
        <div class="form-group">
          <label for="port-name">ชื่อพอร์ต:</label>
          <input type="text" id="port-name" required placeholder="เช่น Zero 3 (เกษียณ)">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="port-category">หมวดหมู่พอร์ต:</label>
            <select id="port-category" required>
              <option value="Emergency">Emergency (เงินฉุกเฉิน)</option>
              <option value="Asset">Asset (สินทรัพย์/เป้าหมายชีวิต)</option>
              <option value="Retirement">Retirement (เกษียณสำราญ)</option>
              <option value="Life Goal">Life Goal (แต่งงาน/ครอบครัว)</option>
              <option value="Global Stock">Global Stock (หุ้นโลก)</option>
              <option value="Thai Stock">Thai Stock (หุ้นไทย)</option>
              <option value="Growth Stock">Growth Stock (หุ้นเติบโต)</option>
              <option value="Forex">Forex (USD)</option>
              <option value="Option">Option (USD)</option>
              <option value="Cash Buffer & หุ้นย่อย">Cash Buffer & หุ้นย่อย</option>
            </select>
          </div>
          <div class="form-group">
            <label for="port-start-date">วันที่เริ่มสะสม:</label>
            <input type="date" id="port-start-date" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="port-goal-type">ประเภทเป้าหมาย:</label>
            <select id="port-goal-type" required>
              <option value="numeric">กำหนดจำนวนเงินเป้าหมาย</option>
              <option value="schedule">กำหนดวัน DCA ประจำเดือน</option>
            </select>
          </div>
          <div class="form-group" id="port-goal-value-container">
            <label for="port-goal-value" id="port-goal-label">เป้าหมาย (จำนวนเงิน):</label>
            <input type="number" id="port-goal-value" placeholder="เช่น 1200000" min="0" value="100000">
            <input type="text" id="port-goal-schedule" placeholder="เช่น DCA ทุกวันที่ 25" class="hidden">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="port-current">เงินสะสมลงทุนจริง:</label>
            <input type="number" id="port-current" required placeholder="เงินรวมปัจจุบันในพอร์ต" min="0" value="0">
          </div>
          <div class="form-group">
            <label for="port-cash-buffer">เงินสดสำรอง (Cash Buffer):</label>
            <input type="number" id="port-cash-buffer" required placeholder="ส่วนสำรองเพื่อสภาพคล่อง" min="0" value="0">
          </div>
          <div class="form-group">
            <label for="port-dry-powder">เงินสำหรับช้อน (Dry Powder):</label>
            <input type="number" id="port-dry-powder" required placeholder="ส่วนรอเข้าซื้อเมื่อย่อ" min="0" value="0">
          </div>
        </div>

        <div class="form-group">
          <label for="port-notes">บันทึกประจำพอร์ต / หมายเหตุเพิ่มเติม:</label>
          <textarea id="port-notes" placeholder="เป้าหมายย่อย กลยุทธ์การเทรด หรือข้อควรระวัง..." rows="3"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-retro btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-primary btn-retro"><span>🎯 บันทึกพอร์ต</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- MODAL: QUICK TRANSFER / WITHDRAWAL -->
  <!-- ========================================== -->
  <div id="transfer-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <div class="modal-header">
        <h3>⚡ โยกย้ายหรือถอนเงินจากพอร์ต</h3>
        <button class="btn-close-modal">✖</button>
      </div>
      <form id="transfer-form" class="modal-body">
        <div class="form-group">
          <label for="tf-source">พอร์ตต้นทาง (หักเงินจากยอด Dry Powder):</label>
          <select id="tf-source" required></select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="tf-amount">จำนวนเงิน:</label>
            <input type="number" id="tf-amount" required placeholder="กรอกจำนวนเงิน" min="0.01" step="any">
          </div>
          <div class="form-group">
            <label for="tf-rate">อัตราแลกเปลี่ยนขณะโยกย้าย (THB/USD):</label>
            <input type="number" id="tf-rate" value="36.5" step="0.1" required>
          </div>
        </div>

        <div class="form-group">
          <label for="tf-target">ปลายทางรับเงิน:</label>
          <select id="tf-target" required>
            <option value="system">ถอนออกนอกระบบ (ใช้จ่าย/เก็บเงินสดแยก)</option>
            <!-- Other portfolios will be injected here -->
          </select>
        </div>

        <div class="form-group id-allocation-group">
          <label for="tf-allocation">จัดสรรเงินไปยังส่วนไหนของพอร์ตปลายทาง:</label>
          <select id="tf-allocation">
            <option value="dryPowder">เงินรอช้อน (Dry Powder)</option>
            <option value="cashBuffer">เงินสำรองสภาพคล่อง (Cash Buffer)</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-retro btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-accent btn-retro"><span>⚡ ดำเนินการโยกย้าย</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toast-container"></div>

  <!-- Core Javascript -->
  <script src="app.js"></script>
</body>
</html>
