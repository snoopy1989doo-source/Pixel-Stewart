<!DOCTYPE html>
<html lang="th">
<head>
  <!-- วางโค้ดนี้ไว้ในแท็ก <head> ของ index.html ฝั่ง Pixel Steward เพื่อเปิดช่องสัญญาณคลาวด์ -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixel Steward - ผู้พิทักษ์พอร์ตมหาสมบัติ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Kanit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=183">

  <style>
    /* ==========================================================================
       🎮 V.1.7.0 PIXEL STYLE EXTRA & BUTTON DELEGATION STYLING
       ========================================================================== */
    .brand-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      margin: 0;
    }
    .brand-title.highlight { color: #3b82f6; }
    .app-version-tag {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #10b981;
      background: #0c1020;
      padding: 4px 6px;
      border: 2px solid #000;
      display: inline-block;
      margin-top: 6px;
    }
    .cartridge-list-rack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .pixel-cartridge-card {
      background: #1b2234;
      border: 4px solid #000;
      box-shadow: 4px 4px 0px #000;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }
    .pixel-cartridge-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 6px;
      background: rgba(255,255,255,0.1);
    }
    .pixel-cartridge-card.active {
      background: var(--color-primary, #3b82f6);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #000;
    }
    .pixel-cartridge-card:hover:not(.active) {
      background: #242f49;
      transform: translateY(-2px);
      box-shadow: 4px 6px 0px #000;
    }
    .cartridge-title {
      font-weight: bold;
      font-size: 0.9rem;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
    }
    .cartridge-meta {
      font-size: 0.7rem;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }
    .ammo-warning-tag {
      color: #ef4444 !important;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      animation: pixel-blink 1s infinite;
    }
    .btn-delete-port-inline {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ef4444;
      color: #fff;
      border: 2px solid #000;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0px 4px;
      z-index: 10;
      font-weight: bold;
    }
    .btn-delete-port-inline:hover { background: #b91c1c; }
    
    /* 🔤 FORCE PIXEL STYLE FOR FINANCIAL NUMBERS */
    .stat-value, .pixel-money {
      font-family: 'Press Start 2P', monospace !important;
      font-size: 1.15rem !important;
      letter-spacing: -1px;
    }
    .dashboard-grid { margin-top: 20px; }
    .stat-card { background: #1f273e; padding: 20px; border: 4px solid #000; box-shadow: 4px 4px 0px #000; }
    .stat-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: bold; color: #94a3b8; }
    .stat-desc { font-size: 0.75rem; color: #64748b; }
    .text-accent { color: var(--color-accent, #eab308) !important; }
    @keyframes pixel-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar border-pixel">
      <div class="brand">
        <div class="logo">🥇</div>
        <div class="title-container">
          <h1 class="brand-title">PIXEL</h1>
          <h1 class="brand-title highlight">STEWARD</h1>
          <span class="badge-version">🔸 V.1.8.3 OPTIMIZED STRIKER</span>
        </div>
      </div>
      
      <div class="nav-divider" style="height:4px; background:#000; margin:15px 0;"></div>
      
      <div class="exchange-widget border-pixel-inset" style="padding:10px; background:#111625; margin-bottom:15px;">
        <label for="global-usd-rate" style="font-size:0.8rem; color:#94a3b8;">💱 อัตราแลกเปลี่ยนคลัง:</label>
        <div style="display:flex; align-items:center; gap:6px; margin-top:4px;">
          <input type="number" id="global-usd-rate" value="36.50" step="0.01" style="width:75px; background:#0c1020; color:#fff; border:2px solid #000; padding:2px 4px; font-family:monospace;">
          <span style="font-size:0.75rem; font-weight:bold; color:#94a3b8;">THB/USD</span>
        </div>
      </div>

      <nav class="nav-menu" style="display:flex; flex-direction:column; gap:6px;">
        <button class="nav-item active" data-tab="dashboard"><span>📊 แดชบอร์ดภาพรวม</span></button>
        <button class="nav-item" data-tab="portfolios"><span>📁 พอร์ตการลงทุน</span></button>
        <button class="nav-item" data-tab="quarterly"><span>📈 หุ้นรายไตรมาส</span></button>
        <button class="nav-item" data-tab="dividends"><span>💰 เงินปันผล & YOC</span></button>
        <button class="nav-item" data-tab="forex"><span>💵 Forex รายเดือน</span></button>
        <button class="nav-item" data-tab="option"><span>💎 Option รายเดือน</span></button>
        <button class="nav-item" data-tab="comparison"><span>⚖️ ตารางเปรียบเทียบ</span></button>
        <button class="nav-item" data-tab="settings"><span>⚙️ ตั้งค่าคลาวด์เซฟ</span></button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="main-header border-pixel" style="background:#1f273e; padding:16px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <div class="header-titles">
          <h1 id="page-title" style="font-size:1.4rem; font-weight:bold; margin:0;">แดชบอร์ดภาพรวม</h1>
          <p id="page-subtitle" class="text-muted" style="margin:4px 0 0 0; font-size:0.85rem; color:#94a3b8;">วิเคราะห์สถานะความมั่งคั่ง กระสุนรอช้อน และแนวโน้มการเติบโตรายไตรมาส</p>
        </div>
        <div class="header-buttons" style="display:flex; gap:10px;">
          <button class="btn btn-primary btn-retro" id="btn-add-portfolio" style="padding:8px 12px;"><span>➕ เพิ่มพอร์ตใหม่</span></button>
          <button class="btn btn-secondary btn-retro" id="btn-quick-transfer" style="padding:8px 12px;"><span>⚡ โยกย้ายเสบียง</span></button>
        </div>
      </header>

      <section id="tab-content" class="tab-pane-container"></section>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- 🟢 MODAL 1: บันทึกรายงานไตรมาส (แก้ไขความซ้ำซ้อนเรียบร้อย) -->
  <div id="quarterly-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <form id="quarterly-form">
        <div class="modal-header">
          <h3 id="q-port-label">✏️ บันทึกรายงานไตรมาส (สูตรคำนวณสากล)</h3>
          <button type="button" class="btn-close-modal">✖</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="q-port-id">
          <input type="hidden" id="q-year">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div class="form-group"><label>ยอดสิ้นไตรมาส 1 (THB):</label><input type="number" id="q-val-q1" class="input-retro" step="any"></div>
            <div class="form-group"><label>ทุนเติม/ถอนสุทธิ Q1:</label><input type="number" id="q-flow-q1" class="input-retro" value="0" step="any"></div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div class="form-group"><label>ยอดสิ้นไตรมาส 2 (THB):</label><input type="number" id="q-val-q2" class="input-retro" step="any"></div>
            <div class="form-group"><label>ทุนเติม/ถอนสุทธิ Q2:</label><input type="number" id="q-flow-q2" class="input-retro" value="0" step="any"></div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div class="form-group"><label>ยอดสิ้นไตรมาส 3 (THB):</label><input type="number" id="q-val-q3" class="input-retro" step="any"></div>
            <div class="form-group"><label>ทุนเติม/ถอนสุทธิ Q3:</label><input type="number" id="q-flow-q3" class="input-retro" value="0" step="any"></div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div class="form-group"><label>ยอดสิ้นไตรมาส 4 (THB):</label><input type="number" id="q-val-q4" class="input-retro" step="any"></div>
            <div class="form-group"><label>ทุนเติม/ถอนสุทธิ Q4:</label><input type="number" id="q-flow-q4" class="input-retro" value="0" step="any"></div>
          </div>
          <div class="form-group">
            <label>หมายเหตุความจำ:</label>
            <input type="text" id="q-notes" class="input-retro" style="width:100%;">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-success" id="btn-save-quarterly"><span>💾 บันทึกข้อมูลไตรมาส</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- 💰 MODAL 2: บันทึกรับเงินปันผล -->
  <div id="dividend-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <div class="modal-header">
        <h3>💰 บันทึกรับเงินปันผล</h3>
        <button class="btn-close-modal">✖</button>
      </div>
      <form id="dividend-form" class="modal-body">
        <div class="form-group">
          <label for="div-port-id">เลือกพॉर्टลงทุน:</label>
          <select id="div-port-id" required class="input-retro"></select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
          <div class="form-group">
            <label for="div-amount">จำนวนเงินปันผลที่ได้รับ:</label>
            <input type="number" id="div-amount" step="any" placeholder="รับเป็นสกุลเงินประจำพอร์ต" class="input-retro" required>
          </div>
          <div class="form-group">
            <label for="div-date">วันที่ได้รับ:</label>
            <input type="date" id="div-date" class="input-retro" required>
          </div>
        </div>
        <div class="form-group">
          <label for="div-notes">หมายเหตุ (เช่น ชื่อหุ้น):</label>
          <input type="text" id="div-notes" placeholder="เช่น หุ้น A ปันผลครึ่งปีแรก" class="input-retro" style="width:100%;">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-success"><span>💰 บันทึกปันผล</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- 📦 MODAL 3: จัดการพอร์ตลงทุน -->
  <div id="portfolio-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <div class="modal-header">
        <h3 id="portfolio-modal-title">📦 จัดการพอร์ตลงทุน</h3>
        <button class="btn-close-modal">✖</button>
      </div>
      <form id="portfolio-form" class="modal-body">
        <input type="hidden" id="edit-port-id">
        <div class="form-group"><label>ชื่อพอร์ตการลงทุน:</label><input type="text" id="port-name" required class="input-retro" placeholder="เช่น Zero 3 (เกษียณ)"></div>
        <div class="form-group">
          <label>หมวดหมู่สินทรัพย์:</label>
          <select id="port-category" class="input-retro">
            <option value="Thai Stock">Thai Stock (หุ้นไทย)</option>
            <option value="Global Stock">Global Stock (หุ้นโลก)</option>
            <option value="Growth Stock">Growth Stock (หุ้นเติบโต)</option>
            <option value="Emergency">Emergency (เงินฉุกเฉิน)</option>
            <option value="Asset">Asset (สินทรัพย์)</option>
            <option value="Retirement">Retirement (กองทุนเกษียณ)</option>
            <option value="Life Goal">Life Goal (เป้าหมายชีวิต)</option>
            <option value="Forex">Forex (ตลาดแลกเปลี่ยน)</option>
            <option value="Option">Option (สัญญาออปชัน)</option>
          </select>
        </div>
        <div class="form-group">
          <label>ประเภทเป้าหมาย:</label>
          <select id="port-goal-type" class="input-retro">
            <option value="numeric">numeric (เป้าหมายจำนวนเงินสะสม)</option>
            <option value="schedule">schedule (เป้าหมายแผนวินัย DCA)</option>
          </select>
        </div>
        <div class="form-group">
          <label id="port-goal-label">เป้าหมายเงินสะสม:</label>
          <input type="number" id="port-goal-value" class="input-retro" value="100000">
          <input type="text" id="port-goal-schedule" class="input-retro hidden" placeholder="เช่น DCA ทุกวันที่ 25 ของเดือน">
        </div>
        <div class="form-group"><label>ระบุเงินช้อนเริ่มต้น (Dry Powder):</label><input type="number" id="port-dry-powder" class="input-retro" value="0"></div>
        <div class="form-group"><label>วันเริ่มต้นเปิดพอร์ต:</label><input type="date" id="port-start-date" class="input-retro"></div>
        <div class="form-group"><label>บันทึกโน้ตเพิ่มเติม:</label><input type="text" id="port-notes" class="input-retro"></div>
        <div class="modal-footer" style="padding:10px 0 0 0;">
          <button type="button" class="btn btn-secondary btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-success"><span>💾 บันทึกตลับพอร์ต</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- ⚡ MODAL 4: โยกย้ายและจัดสรรเสบียง -->
  <div id="transfer-modal" class="modal-overlay hidden">
    <div class="modal-card border-pixel">
      <div class="modal-header">
        <h3>⚡ โยกย้ายและจัดสรรเสบียง</h3>
        <button class="btn-close-modal">✖</button>
      </div>
      <form id="transfer-form" class="modal-body">
        <div class="form-group"><label>พอร์ตต้นทาง (หักเงินจาก Dry Powder):</label><select id="tf-source" class="input-retro"></select></div>
        <div class="form-group"><label>ปลายทางรับเงิน:</label><select id="tf-target" class="input-retro"></select></div>
        <div class="form-group id-allocation-group"><label>จัดสรรเงินไปยังส่วนไหนของพอร์ตปลายทาง:</label><select id="tf-allocation" class="input-retro"><option value="dryPowder">เงินรอช้อน (Dry Powder)</option></select></div>
        <div class="form-group"><label>จำนวนเงินที่ต้องการโอน:</label><input type="number" id="tf-amount" required class="input-retro" placeholder="ระบุจำนวนเงิน"></div>
        <div class="form-group"><label>อัตราแลกเปลี่ยนชั่วคราว (ถ้ามีการแปลงสกุลเงิน):</label><input type="number" id="tf-rate" step="0.01" class="input-retro" value="36.50"></div>
        <div class="modal-footer" style="padding:10px 0 0 0;">
          <button type="button" class="btn btn-secondary btn-close-modal"><span>ยกเลิก</span></button>
          <button type="submit" class="btn btn-primary"><span>⚡ ยืนยันการโอนเสบียง</span></button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
